<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>로그인페이지</title>
    <link rel="stylesheet" href="css/login_ex.css" />
  </head>
  <body>
    <div class="login-box">
      <div class="kakao-btn">
        <p class="kakao-logo"><img src="images/kakao.png" alt="카카오로고" /></p>
        <p class="login-text">Login with a Kakao</p>
      </div>
      <p class="or-text">or</p>
      <form class="form_wrap">
        <input type="text" placeholder="Username">
        <input type="password" placeholder="Password">
        <button class="login-btn">LOGIN</button>
      </form>
      <p class="forgot">Forgot your Password?</p>
    </div>
  </body>
</html>
